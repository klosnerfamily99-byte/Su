<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Forest Survivor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  .stat-bar { display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
  .stat-label { color: #aaa; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
  .bar-bg { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 2px; height: 8px; width: 120px; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .bar-hp   { background: linear-gradient(90deg, #c0392b, #ff5a3c); }
  .bar-hunger { background: linear-gradient(90deg, #b8860b, #ffd24a); }
  .bar-thirst { background: linear-gradient(90deg, #0e7c8c, #33d6e8); }

  #day-counter {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; pointer-events: none; z-index: 10;
  }
  #time-icon { font-size: 18px; display: block; text-align: center; margin-bottom: 2px; }

  #backpack-btn {
    position: fixed; top: 10px; right: 10px;
    width: 46px; height: 46px;
    border-radius: 10px;
    background: linear-gradient(160deg, #8a5a2e, #5e3c1c);
    border: 2px solid rgba(255,210,140,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    z-index: 15; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transform-origin: top right;
  }
  #backpack-btn:active { background: linear-gradient(160deg, #a06c38, #6e4621); }

  #hotbar {
    position: fixed; bottom: 96px; left: 50%;
    display: flex; gap: 6px; z-index: 10;
    transform-origin: bottom center;
  }
  .hotbar-slot {
    width: 44px; height: 44px;
    background: linear-gradient(160deg, #6b4423, #4a2f18);
    border: 1px solid rgba(255,210,140,0.35);
    border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 18px; color: white;
    position: relative;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .hotbar-slot.equipped {
    border: 2px solid #ffe27a;
    box-shadow: 0 0 8px rgba(255,226,122,0.6);
  }
  .hotbar-count {
    position: absolute; bottom: 1px; right: 3px;
    font-size: 9px; color: #ffe27a;
  }

  #backpack-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
  }
  #backpack-panel {
    width: min(340px, 90vw);
    max-height: 78vh;
    background: linear-gradient(160deg, #5e3c1c, #3c2710);
    border: 2px solid rgba(255,210,140,0.4);
    border-radius: 12px;
    padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #backpack-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  #backpack-title {
    color: #ffe27a; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
  }
  #backpack-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.1); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #backpack-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 6px; overflow-y: auto; padding-right: 2px;
  }
  .backpack-slot {
    aspect-ratio: 1; background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: white; position: relative;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .backpack-slot:active { background: rgba(255,255,255,0.12); }
  .backpack-count {
    position: absolute; bottom: 1px; right: 3px;
    font-size: 9px; color: #ffe27a;
  }

  #crafting-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
  }
  #crafting-panel {
    width: min(320px, 90vw);
    max-height: 78vh;
    background: linear-gradient(160deg, #5e3c1c, #3c2710);
    border: 2px solid rgba(255,210,140,0.4);
    border-radius: 12px;
    padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #crafting-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  #crafting-title {
    color: #ffe27a; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
  }
  #crafting-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.1); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #crafting-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .craft-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .craft-row:active { background: rgba(255,255,255,0.12); }
  .craft-row.disabled { opacity: 0.45; }
  .craft-icon { font-size: 22px; width: 30px; text-align: center; }
  .craft-name { color: white; font-size: 13px; flex: 1; min-width: 90px; }
  .craft-cost { color: #ffe27a; font-size: 12px; width: 100%; text-align: right; }

  #placement-controls {
    position: fixed; bottom: 158px; left: 50%; transform: translateX(-50%);
    display: none; gap: 18px; z-index: 25;
  }
  .place-btn {
    width: 54px; height: 54px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: white;
    border: 2px solid rgba(255,255,255,0.45);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #place-confirm { background: rgba(35,140,70,0.85); }
  #place-cancel  { background: rgba(150,40,40,0.85); }

  /* Mobile controls */
  #joystick-zone {
    position: fixed; bottom: 20px; left: 20px;
    width: 110px; height: 110px;
    z-index: 20;
    transform-origin: bottom left;
  }
  #joystick-bg {
    width: 110px; height: 110px;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    position: absolute;
  }
  #joystick-thumb {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    position: absolute;
    top: 33px; left: 33px;
    transition: none;
  }

  #action-buttons {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 20;
    transform-origin: bottom right;
  }
  .action-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(80,220,230,0.45);
    background: rgba(15,40,45,0.55);
    color: white; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .action-btn:active { background: rgba(80,220,230,0.25); }

  #look-zone {
    position: fixed;
    top: 0; left: 110px; right: 130px; bottom: 0;
    z-index: 5;
  }

  /* Left-handed layout: swap joystick and hand button sides */
  body.left-handed #joystick-zone { left: auto; right: 20px; transform-origin: bottom right; }
  body.left-handed #action-buttons { right: auto; left: 20px; transform-origin: bottom left; }
  body.left-handed #look-zone { left: 130px; right: 110px; }

  #message {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: white; font-size: 14px; letter-spacing: 1px;
    text-align: center;
    background: rgba(0,0,0,0.7);
    padding: 10px 20px; border-radius: 6px;
    pointer-events: none; z-index: 30;
    opacity: 0; transition: opacity 0.4s;
  }
  #message.show { opacity: 1; }

  #craft-prompt-btn {
    position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 22px;
    background: rgba(138,90,46,0.9);
    border: 2px solid rgba(255,210,140,0.6);
    color: white; font-size: 14px; letter-spacing: 1px;
    display: none; align-items: center; justify-content: center;
    z-index: 12; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #craft-prompt-btn:active { background: rgba(168,112,60,0.95); }

  #death-screen {
    position: fixed; inset: 0;
    background: rgba(100,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px; z-index: 100;
  }
  #death-screen h1 { color: #ff3333; font-size: 36px; letter-spacing: 4px; }
  #death-screen p  { color: #ffaaaa; font-size: 14px; letter-spacing: 2px; }
  #restart-btn {
    padding: 12px 32px;
    background: #991b1b; border: 2px solid #ef4444;
    color: white; font-size: 14px; letter-spacing: 2px;
    border-radius: 4px; cursor: pointer;
    font-family: 'Courier New', monospace;
  }

  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 16px; height: 16px;
    pointer-events: none; z-index: 10;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.7);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

  /* ─── START / SETTINGS MENUS ─────────────────────────────────────────── */
  .menu-screen {
    position: fixed; inset: 0;
    background: rgba(5,12,8,0.78);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }
  .menu-panel {
    width: min(360px, 88vw);
    max-height: 86vh; overflow-y: auto;
    background: linear-gradient(165deg, #3c5a32, #233b1f);
    border: 2px solid rgba(255,226,122,0.35);
    border-radius: 16px;
    padding: 26px 22px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .menu-panel h1 {
    color: #ffe27a; font-size: 22px; letter-spacing: 2px;
    text-align: center; text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .menu-panel h2 {
    color: #ffe27a; font-size: 18px; letter-spacing: 2px;
    text-align: center; margin-bottom: 4px;
  }
  .menu-tagline {
    color: rgba(255,255,255,0.75); font-size: 12.5px;
    text-align: center; margin-top: -6px; margin-bottom: 6px;
  }
  .menu-btn {
    padding: 13px 18px; border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: white; font-size: 14px; letter-spacing: 1px;
    font-family: 'Courier New', monospace;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .menu-btn:active { background: rgba(255,255,255,0.18); }
  .menu-btn.primary {
    background: linear-gradient(160deg, #5fae3e, #3f7d28);
    border-color: rgba(255,255,255,0.4);
    font-weight: bold;
  }
  .setting-row {
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.12);
  }
  .setting-row label {
    color: white; font-size: 13px; letter-spacing: 1px;
    display: flex; justify-content: space-between;
  }
  .setting-row label span { color: #ffe27a; }
  .setting-row input[type="range"] { width: 100%; }
  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn {
    flex: 1; padding: 9px 6px; text-align: center;
    background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px; color: rgba(255,255,255,0.75); font-size: 12px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .toggle-btn.active {
    background: rgba(255,226,122,0.25); border-color: #ffe27a; color: #ffe27a;
  }
</style>
</head>
<body>

<!-- Start / Settings menus -->
<div id="start-screen" class="menu-screen">
  <div class="menu-panel">
    <h1>🌲 FOREST SURVIVOR</h1>
    <p class="menu-tagline">Gather, craft, and survive the wilderness.</p>
    <button class="menu-btn primary" id="play-btn">▶ Play</button>
    <button class="menu-btn" id="open-settings-btn">⚙ Settings</button>
  </div>
</div>

<div id="settings-screen" class="menu-screen" style="display:none;">
  <div class="menu-panel">
    <h2>Settings</h2>

    <div class="setting-row">
      <label>Look Sensitivity <span id="sens-value">1.0x</span></label>
      <input type="range" id="sens-slider" min="0.5" max="2" step="0.1" value="1">
    </div>

    <div class="setting-row">
      <label>Joystick Side</label>
      <div class="toggle-group" id="layout-toggle">
        <div class="toggle-btn active" data-layout="right">Right</div>
        <div class="toggle-btn" data-layout="left">Left</div>
      </div>
    </div>

    <div class="setting-row">
      <label>UI Size</label>
      <div class="toggle-group" id="scale-toggle">
        <div class="toggle-btn" data-scale="0.8">Small</div>
        <div class="toggle-btn active" data-scale="1">Medium</div>
        <div class="toggle-btn" data-scale="1.2">Large</div>
      </div>
    </div>

    <button class="menu-btn" id="settings-back-btn">Back</button>
  </div>
</div>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="stat-bar">
    <div class="stat-label">Health</div>
    <div class="bar-bg"><div class="bar-fill bar-hp" id="bar-hp" style="width:100%"></div></div>
    <div class="stat-label">Hunger</div>
    <div class="bar-bg"><div class="bar-fill bar-hunger" id="bar-hunger" style="width:100%"></div></div>
    <div class="stat-label">Thirst</div>
    <div class="bar-bg"><div class="bar-fill bar-thirst" id="bar-thirst" style="width:100%"></div></div>
  </div>
  <div style="text-align:right; color:rgba(255,255,255,0.6); font-size:10px; letter-spacing:1px; margin-top:54px;">
    <div id="score-display">Score: 0</div>
    <div id="kills-display">Wolves: 0</div>
  </div>
</div>

<div id="backpack-btn">🎒</div>

<div id="day-counter">
  <span id="time-icon">🌙</span>
  <span id="day-text">Day 1</span>
</div>

<div id="hotbar"></div>

<div id="backpack-overlay">
  <div id="backpack-panel">
    <div id="backpack-header">
      <span id="backpack-title">Backpack</span>
      <div id="backpack-close">✕</div>
    </div>
    <div id="backpack-grid"></div>
  </div>
</div>

<div id="crafting-overlay">
  <div id="crafting-panel">
    <div id="crafting-header">
      <span id="crafting-title">Crafting Table</span>
      <div id="crafting-close">✕</div>
    </div>
    <div id="crafting-list"></div>
  </div>
</div>

<div id="placement-controls">
  <div class="place-btn" id="place-cancel">✕</div>
  <div class="place-btn" id="place-confirm">✓</div>
</div>

<div id="crosshair"></div>
<div id="message"></div>
<div id="craft-prompt-btn">🔨 Craft</div>

<!-- Joystick -->
<div id="joystick-zone">
  <div id="joystick-bg"></div>
  <div id="joystick-thumb"></div>
</div>

<!-- Look zone (middle of screen for camera drag) -->
<div id="look-zone"></div>

<!-- Action buttons -->
<div id="action-buttons">
  <div class="action-btn" id="btn-interact">✊</div>
</div>

<!-- Death Screen -->
<div id="death-screen">
  <h1>YOU DIED</h1>
  <p id="death-msg">You survived 0 days in the forest.</p>
  <button id="restart-btn" onclick="location.reload()">TRY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SCENE SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x0a1a0a);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xbfe8ff, 0.018);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ─── FIRST-PERSON AXE MODEL ───────────────────────────────────────────────────
scene.add(camera); // so the camera's child (the axe) renders correctly
const axeGroup = new THREE.Group();
let axeSwingTimer = 0;

// ─── TOON SHADING HELPER (cel-shaded "Raft" look) ─────────────────────────────
function buildToonGradient() {
  const colors = new Uint8Array([70, 140, 200, 255]);
  const tex = new THREE.DataTexture(colors, colors.length, 1, THREE.LuminanceFormat);
  tex.needsUpdate = true;
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}
const toonGradient = buildToonGradient();

// Build the first-person axe now that toon materials are available
{
  const handleMat = new THREE.MeshToonMaterial({ color: 0x8a5a2e, gradientMap: toonGradient });
  const headMat   = new THREE.MeshToonMaterial({ color: 0xb8b8c0, gradientMap: toonGradient });
  const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.03, 0.55, 6), handleMat);
  handle.rotation.z = Math.PI / 2.6;
  axeGroup.add(handle);
  const head = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.22, 4), headMat);
  head.position.set(0.24, 0.13, 0);
  head.rotation.z = Math.PI / 2;
  axeGroup.add(head);
  axeGroup.position.set(0.32, -0.32, -0.55);
  axeGroup.rotation.set(0.3, -0.5, 0.1);
  camera.add(axeGroup);
}

// ─── LIGHTING (bright stylized outdoor look) ──────────────────────────────────
const hemiLight = new THREE.HemisphereLight(0x9fd8ff, 0x4a7a3a, 0.9);
scene.add(hemiLight);

const sunLight = new THREE.DirectionalLight(0xfff2cc, 1.2);
sunLight.position.set(10, 30, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
sunLight.shadow.camera.far = 150;
sunLight.shadow.camera.left = -50;
sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 50;
sunLight.shadow.camera.bottom = -50;
scene.add(sunLight);

// ─── TERRAIN HEIGHT (hills in some places, flat in others) + lake basins ────
const hillCenters = [];
for (let i = 0; i < 9; i++) {
  const a = Math.random() * Math.PI * 2;
  const d = 18 + Math.random() * 65;
  hillCenters.push({
    x: Math.cos(a) * d,
    z: Math.sin(a) * d,
    radius: 9 + Math.random() * 13,
    height: 3 + Math.random() * 5
  });
}

const lakeCenters = [];
for (let i = 0; i < 4; i++) {
  const a = Math.random() * Math.PI * 2;
  const d = 28 + Math.random() * 48;
  lakeCenters.push({
    x: Math.cos(a) * d,
    z: Math.sin(a) * d,
    radius: 8 + Math.random() * 5
  });
}

function getTerrainHeight(x, z) {
  let h = 0;
  for (const hill of hillCenters) {
    const dx = x - hill.x, dz = z - hill.z;
    const d2 = dx * dx + dz * dz;
    h += hill.height * Math.exp(-d2 / (hill.radius * hill.radius));
  }
  for (const lake of lakeCenters) {
    const dx = x - lake.x, dz = z - lake.z;
    const d2 = dx * dx + dz * dz;
    h -= 1.4 * Math.exp(-d2 / (lake.radius * lake.radius)); // carve a basin
  }
  // tiny ripple so "flat" ground still feels natural, not billiard-table flat
  h += Math.sin(x * 0.08) * Math.cos(z * 0.08) * 0.2;

  // Smoothly flatten the spawn clearing instead of a hard cutoff (a hard cutoff
  // caused a sudden vertical snap right at the boundary — the "falling through
  // the ground" bug — whenever a hill's falloff still had height there).
  const distFromSpawn = Math.hypot(x, z);
  const flattenRadius = 12;
  if (distFromSpawn < flattenRadius) {
    const t = distFromSpawn / flattenRadius;
    h *= t * t;
  }
  return h;
}

function isInLake(x, z) {
  return lakeCenters.some(l => Math.hypot(x - l.x, z - l.z) < l.radius * 0.85);
}

// ─── GROUND ───────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(200, 200, 80, 80);
const groundMat = new THREE.MeshToonMaterial({ color: 0x5fae3e, gradientMap: toonGradient });
const posArr = groundGeo.attributes.position.array;
for (let i = 0; i < posArr.length; i += 3) {
  const xWorld = posArr[i];
  const zWorld = -posArr[i + 1]; // plane's local Y maps to world -Z once rotated below
  posArr[i + 2] = getTerrainHeight(xWorld, zWorld); // local Z becomes world height (Y) after rotation
}

// ─── INVENTORY: 50-slot backpack (storage) + 7-slot hotbar (usable) ──────────
const backpack = new Array(50).fill(null);
const hotbar = new Array(7).fill(null);
// You start empty-handed (bare fists) with just a crafting table to set up camp.

const ITEM_ICONS = {
  axe: '🪓', pickaxe: '⛏️', wood: '🪵', food: '🍄', leaves: '🍃', stone: '🪨', water: '💧',
  purifier: '🚰', poultice: '🩹',
  campfire: '🔥', wall: '🧱', ceiling: '⬜', floor: '🟫', crafting_table: '🔨'
};
const PLACEABLE_TYPES = ['campfire', 'wall', 'ceiling', 'floor', 'crafting_table'];
let backpackOpen = false;
let craftingOpen = false;

// New items prefer an existing matching stack (hotbar first, then backpack),
// then an empty hotbar slot, then an empty backpack slot.
function addItem(type, amount) {
  let slot = hotbar.findIndex(h => h && h.type === type);
  if (slot !== -1) { hotbar[slot].count += amount; renderInventoryUI(); return true; }

  slot = backpack.findIndex(s => s && s.type === type);
  if (slot !== -1) { backpack[slot].count += amount; renderInventoryUI(); return true; }

  slot = hotbar.findIndex(h => h === null);
  if (slot !== -1) { hotbar[slot] = { type, count: amount }; renderInventoryUI(); return true; }

  slot = backpack.findIndex(s => s === null);
  if (slot !== -1) { backpack[slot] = { type, count: amount }; renderInventoryUI(); return true; }

  return false; // everything is full
}

function getTotalCount(type) {
  let total = 0;
  for (const h of hotbar) if (h && h.type === type) total += h.count;
  for (const b of backpack) if (b && b.type === type) total += b.count;
  return total;
}

function consumeItem(type, amount) {
  let remaining = amount;
  for (let i = 0; i < hotbar.length && remaining > 0; i++) {
    const h = hotbar[i];
    if (h && h.type === type) {
      const take = Math.min(h.count, remaining);
      h.count -= take; remaining -= take;
      if (h.count <= 0) hotbar[i] = null;
    }
  }
  for (let i = 0; i < backpack.length && remaining > 0; i++) {
    const b = backpack[i];
    if (b && b.type === type) {
      const take = Math.min(b.count, remaining);
      b.count -= take; remaining -= take;
      if (b.count <= 0) backpack[i] = null;
    }
  }
  renderInventoryUI();
}

function moveBackpackToHotbar(i) {
  const item = backpack[i];
  if (!item) return;
  let target = hotbar.findIndex(h => h && h.type === item.type);
  if (target === -1) target = hotbar.findIndex(h => h === null);
  if (target === -1) { showMsg('Hotbar is full!'); return; }
  if (hotbar[target]) hotbar[target].count += item.count;
  else hotbar[target] = { type: item.type, count: item.count };
  backpack[i] = null;
  showMsg(ITEM_ICONS[item.type] + ' Moved to hotbar');
  renderInventoryUI();
}

function tapHotbarSlot(i) {
  const item = hotbar[i];

  if (!item) {
    if (placingItem) teardownPlacement();
    player.selectedSlot = i;
    renderInventoryUI();
    showMsg('✊ Bare hands ready.');
    return;
  }

  if (PLACEABLE_TYPES.includes(item.type)) {
    if (placingItem && placingItem.hotbarIndex === i) teardownPlacement();
    else startPlacing(i);
    player.selectedSlot = i;
    renderInventoryUI();
    return;
  }

  if (placingItem) teardownPlacement();
  player.selectedSlot = i;

  if (item.type === 'axe') {
    showMsg('🪓 Axe equipped — tap the screen to swing it!');
  } else if (item.type === 'pickaxe') {
    showMsg('⛏️ Pickaxe equipped — a heavier hit against wolves!');
  } else if (item.type === 'purifier') {
    showMsg('🚰 Purifier equipped. Walk up to a lake and tap ✊ to draw clean water.');
  } else if (item.type === 'food') {
    player.hunger = Math.min(100, player.hunger + 25);
    item.count--;
    if (item.count <= 0) hotbar[i] = null;
    showMsg('🍄 Ate a mushroom.');
  } else if (item.type === 'water') {
    player.thirst = Math.min(100, player.thirst + 25);
    item.count--;
    if (item.count <= 0) hotbar[i] = null;
    showMsg('💧 Drank clean water.');
  } else if (item.type === 'poultice') {
    player.hp = Math.min(100, player.hp + 40);
    item.count--;
    if (item.count <= 0) hotbar[i] = null;
    showMsg('🩹 Used a healing poultice. +40 HP');
  } else if (item.type === 'wood' || item.type === 'leaves') {
    showMsg(ITEM_ICONS[item.type] + ' Take this to a crafting table to build things!');
  }
  renderInventoryUI();
}

function renderInventoryUI() {
  const hotbarEl = document.getElementById('hotbar');
  hotbarEl.innerHTML = '';
  hotbar.forEach((item, i) => {
    const slot = document.createElement('div');
    slot.className = 'hotbar-slot' + (i === player.selectedSlot ? ' equipped' : '');
    if (item) {
      slot.innerHTML = ITEM_ICONS[item.type] + `<span class="hotbar-count">${item.count}</span>`;
    }
    slot.onclick = () => tapHotbarSlot(i);
    hotbarEl.appendChild(slot);
  });

  // The hand button mirrors whatever's equipped — a fist when the slot is empty
  const equipped = hotbar[player.selectedSlot];
  document.getElementById('btn-interact').textContent = equipped ? ITEM_ICONS[equipped.type] : '✊';

  if (backpackOpen) {
    const gridEl = document.getElementById('backpack-grid');
    gridEl.innerHTML = '';
    backpack.forEach((item, i) => {
      const slot = document.createElement('div');
      slot.className = 'backpack-slot';
      if (item) {
        slot.innerHTML = ITEM_ICONS[item.type] + `<span class="backpack-count">${item.count}</span>`;
        slot.onclick = () => { moveBackpackToHotbar(i); };
      }
      gridEl.appendChild(slot);
    });
  }
}

function openBackpack() {

  document.getElementById('backpack-overlay').style.display = 'flex';
  renderInventoryUI();

function closeBackpack() {
  backpackOpen = false;

// ─── CRAFTING ─────────────────────────────────────────────────────────────────
const RECIPES = [
  { type: 'axe',      name: 'Axe',             icon: '🪓', cost: { wood: 4 } },
  { type: 'pickaxe',  name: 'Pickaxe',         icon: '⛏️', cost: { wood: 3, stone: 3 } },
  { type: 'purifier', name: 'Water Purifier',  icon: '🚰', cost: { wood: 3, leaves: 4 } },
  { type: 'poultice', name: 'Healing Poultice', icon: '🩹', cost: { food: 3, leaves: 2 } },
  { type: 'campfire', name: 'Campfire',         icon: '🔥', cost: { wood: 3 } },
  { type: 'wall',     name: 'Wood Wall',        icon: '🧱', cost: { wood: 4 } },
  { type: 'ceiling',  name: 'Wood Ceiling',     icon: '⬜', cost: { wood: 4 } },
  { type: 'floor',    name: 'Wood Floor',       icon: '🟫', cost: { wood: 3 } },
];

function craftItem(recipe) {
  for (const [resType, amt] of Object.entries(recipe.cost)) {
    if (getTotalCount(resType) < amt) {
      showMsg(`Need ${amt} ${ITEM_ICONS[resType]} (have ${getTotalCount(resType)})`);
      return;
    }
  }
  for (const [resType, amt] of Object.entries(recipe.cost)) consumeItem(resType, amt);
  const added = addItem(recipe.type, 1);
  if (!added) showMsg('🎒 No room to carry it! Craft cancelled.');
  else showMsg(recipe.icon + ' Crafted ' + recipe.name + '!');
  renderCraftingUI();
}

function renderCraftingUI() {
  const listEl = document.getElementById('crafting-list');
  listEl.innerHTML = '';
  RECIPES.forEach(r => {
    const haveEnough = Object.entries(r.cost).every(([t, amt]) => getTotalCount(t) >= amt);
    const costStr = Object.entries(r.cost)
      .map(([t, amt]) => `${ITEM_ICONS[t]} ${getTotalCount(t)}/${amt}`)
      .join('&nbsp;&nbsp;');
    const row = document.createElement('div');
    row.className = 'craft-row' + (haveEnough ? '' : ' disabled');
    row.innerHTML = `
      <span class="craft-icon">${r.icon}</span>
      <span class="craft-name">${r.name}</span>
      <span class="craft-cost">${costStr}</span>
    `;
    row.onclick = () => craftItem(r);
    listEl.appendChild(row);
  });
}

// ─── PLACEMENT (equip a built item, preview it in front of you, then confirm) ─
let placingItem = null; // { type, hotbarIndex }
let ghostMesh = null;
const ghostMat = new THREE.MeshBasicMaterial({ color: 0x88ffaa, transparent: true, opacity: 0.45, depthWrite: false });

function createGhost(type) {
  let geo;
  if (type === 'campfire') geo = new THREE.CylinderGeometry(0.3, 0.35, 0.4, 8);
  else if (type === 'wall') geo = new THREE.BoxGeometry(2, 2, 0.15);
  else if (type === 'ceiling') geo = new THREE.BoxGeometry(2, 0.15, 2);
  else if (type === 'crafting_table') geo = new THREE.BoxGeometry(1.6, 0.9, 1.0);
  else geo = new THREE.BoxGeometry(2, 0.1, 2); // floor
  const mesh = new THREE.Mesh(geo, ghostMat);
  scene.add(mesh);
  return mesh;
}

function startPlacing(i) {
  const item = hotbar[i];
  if (!item) return;
  if (placingItem) teardownPlacement();
  placingItem = { type: item.type, hotbarIndex: i };
  ghostMesh = createGhost(item.type);
  document.getElementById('placement-controls').style.display = 'flex';
  showMsg('Move into position, then confirm placement.');
}

function teardownPlacement() {
  if (ghostMesh) { scene.remove(ghostMesh); ghostMesh = null; }
  placingItem = null;
  document.getElementById('placement-controls').style.display = 'none';
}

document.getElementById('place-confirm').addEventListener('click', () => {
  if (!placingItem || !ghostMesh) return;
  const px = ghostMesh.position.x, pz = ghostMesh.position.z;
  if (placingItem.type === 'campfire') buildCampfire(px, pz);
  else if (placingItem.type === 'wall') buildWall(px, pz, ghostMesh.rotation.y);
  else if (placingItem.type === 'ceiling') buildCeiling(px, pz);
  else if (placingItem.type === 'floor') buildFloor(px, pz);
  else if (placingItem.type === 'crafting_table') craftingTables.push(buildCraftingTable(px, pz));

  const slot = hotbar[placingItem.hotbarIndex];
  if (slot) { slot.count--; if (slot.count <= 0) hotbar[placingItem.hotbarIndex] = null; }
  teardownPlacement();
  renderInventoryUI();
  showMsg('✅ Placed!');
});
document.getElementById('place-cancel').addEventListener('click', () => {
  teardownPlacement();
  showMsg('Placement cancelled.');
});

const jZone  = document.getElementById('joystick-zone');
const jThumb = document.getElementById('joystick-thumb');
const joystick = { x: 0, y: 0, active: false, id: null, cx: 0, cy: 0 };

jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joystick.active = true; joystick.id = t.identifier;
  joystick.cx = t.clientX; joystick.cy = t.clientY;
}, { passive: false });

document.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      const dx = t.clientX - joystick.cx;
      const dy = t.clientY - joystick.cy;
      const dist = Math.min(Math.hypot(dx, dy), 38);
      const angle = Math.atan2(dy, dx);
      joystick.x = Math.cos(angle) * dist / 38;
      joystick.y = Math.sin(angle) * dist / 38;
      jThumb.style.left = (33 + Math.cos(angle)*dist) + 'px';
      jThumb.style.top  = (33 + Math.sin(angle)*dist) + 'px';
    }
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      joystick.active = false; joystick.x = 0; joystick.y = 0;

lookZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];

  lookState.lx = t.clientX; lookState.ly = t.clientY;
  lookState.startX = t.clientX; lookState.startY = t.clientY;
  lookState.startTime = Date.now();
  lookState.moved = 0;
}, { passive: false });

document.addEventListener('touchmove', e => {

      lookState.moved += Math.hypot(dx, dy);

// ─── INTERACTION ──────────────────────────────────────────────────────────────
function doInteract() {
  if (!gameStarted || player.dead) return;
  const cam = camera.position;

  // Lake nearby?
  for (const lake of lakeCenters) {
    const d = Math.hypot(cam.x - lake.x, cam.z - lake.z);
    if (d < lake.radius + 2) {
      if (getTotalCount('purifier') > 0) {
        const amount = 20 + Math.floor(Math.random() * 15);
        const added = addItem('water', amount);
        if (!added) { showMsg('🎒 Inventory is full!'); return; }
        showMsg('🚰 Purified ' + amount + ' water from the lake!');
      } else {
        showMsg('💧 This lake water isn\'t safe to drink. Craft a Water Purifier first!');
      }
      return;
    }
  }

  // Check resources
  for (let i = resources.length - 1; i >= 0; i--) {
    const r = resources[i];
    if (cam.distanceTo(r.position) < 3) {
      const added = addItem(r.userData.type, r.userData.amount);
      if (!added) { showMsg('🎒 Backpack is full!'); return; }
      const labels = { food: '🍄 Found mushrooms! +', leaves: '🍃 Gathered leaves! +', stone: '🪨 Picked up a rock! +' };
      showMsg(labels[r.userData.type] + r.userData.amount);
      scene.remove(r);
      resources.splice(i, 1);
      // respawn later
      setTimeout(() => spawnResource(r.userData.type, 1), 30000);
      return;
    }
  }

  // Nothing to pick up — use whatever's equipped (hand/axe/pickaxe) instead
  swingTool();
}

function swingTool() {
  if (!gameStarted || player.dead || player.attackCooldown > 0) return;
  player.attackCooldown = 0.5;
  axeSwingTimer = 0.25;

  const equipped = hotbar[player.selectedSlot];
  const usingAxe = !!(equipped && equipped.type === 'axe');
  const usingPickaxe = !!(equipped && equipped.type === 'pickaxe');
  const toolIcon = usingPickaxe ? '⛏️' : (usingAxe ? '🪓' : '✊');

  // Ray from camera
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  // 1. Nearby wolf in front of you?
  let hitWolf = null, minDist = 4;
  for (const wolf of wolves) {
    const toWolf = wolf.position.clone().sub(camera.position);
    const dist = toWolf.length();
    if (dist < minDist) {
      const dot = toWolf.clone().normalize().dot(dir);
      if (dot > 0.6) { hitWolf = wolf; minDist = dist; }
    }
  }
  if (hitWolf) {
    hitWolf.userData.hp -= usingPickaxe ? 1.5 : (usingAxe ? 1 : 0.5);
    showMsg(toolIcon + ' Hit the wolf!');
    if (hitWolf.userData.hp <= 0) {
      scene.remove(hitWolf);
      wolves.splice(wolves.indexOf(hitWolf), 1);
      player.kills++;
      player.score += 50;
      showMsg('💀 Wolf defeated! +50 pts');
      // drop food
      const f = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 6, 6),
        new THREE.MeshToonMaterial({ color: 0xff5a3c, gradientMap: toonGradient })
      );
      f.position.copy(hitWolf.position).add(new THREE.Vector3(0, 0.3, 0));
      f.userData = { type: 'food', amount: 30, baseY: f.position.y, bobOffset: Math.random() * Math.PI * 2 };
      scene.add(f);
      resources.push(f);
    }
    return;
  }

  // 2. Nearby tree to chop?
  for (const tree of trees) {
    if (camera.position.distanceTo(tree.position) < 3 && tree.userData.wood > 0) {
      const got = Math.min(tree.userData.wood, usingAxe ? 2 : 1);
      tree.userData.wood -= got;
      const added = addItem('wood', got);
      if (added) showMsg(toolIcon + ' Chopped wood! +' + got);
      else showMsg('🎒 Backpack is full! Couldn\'t carry the wood.');
      if (tree.userData.wood <= 0) {
        scene.remove(tree);
        trees.splice(trees.indexOf(tree), 1);
      }
      return;
    }
  }

  showMsg(toolIcon + ' Swung at nothing.');
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const DAY_DURATION = 600; // 10 real-world minutes per full day/night cycle

function tick() {
  requestAnimationFrame(tick);

  if (!gameStarted) {
    // Slow idle orbit showing off the forest behind the start screen
    const dt = Math.min(clock.getDelta(), 0.1);
    menuAngle += dt * 0.08;
    camera.position.set(Math.sin(menuAngle) * 14, 7, Math.cos(menuAngle) * 14);
    camera.lookAt(0, 2, 0);
    renderer.render(scene, camera);
    return;
  }

  if (player.dead) { renderer.render(scene, camera); return; }

  const dt = Math.min(clock.getDelta(), 0.1);

  // ── Day/Night cycle
  const prevDayTime = player.dayTime;
  player.dayTime = (player.dayTime + dt / DAY_DURATION) % 1;
  const isDay = player.dayTime < 0.5; // used only for the day-counter / icon / wolf spawns

  // Smooth, continuous brightness: peaks at midday (t=0.25), troughs at midnight (t=0.75),
  // gradually rising through dawn (near t=0) and gradually falling through dusk (near t=0.5).
  const brightness = (1 + Math.cos(2 * Math.PI * (player.dayTime - 0.25))) / 2;

  hemiLight.intensity = 0.3 + brightness * 0.8;
  sunLight.intensity = 0.15 + brightness * 1.05;
  sunLight.color.set(0x6f86c9).lerp(new THREE.Color(0xfff2cc), brightness);

  // Sun and moon ride opposite arcs so one rises as the other sets
  const arc = player.dayTime * Math.PI * 2;
  const sunDir = new THREE.Vector3(Math.cos(arc), Math.sin(arc), -0.3).normalize();
  const moonDir = new THREE.Vector3(Math.cos(arc + Math.PI), Math.sin(arc + Math.PI), -0.3).normalize();
  sunLight.position.copy(sunDir).multiplyScalar(40);
  sunSprite.position.copy(camera.position).add(sunDir.clone().multiplyScalar(90));
  sunSprite.material.opacity = Math.max(0.12, brightness);
  moonSprite.position.copy(camera.position).add(moonDir.clone().multiplyScalar(90));
  moonSprite.material.opacity = Math.max(0.12, 1 - brightness);

  starsMat.opacity = 0.75 * (1 - brightness);

  skyTimer += dt;
  if (skyTimer > 0.4) {
    skyTimer = 0;
    paintSky(
      lerpHexColor(0x10173a, 0xbfe8ff, brightness),
      lerpHexColor(0x2b3a66, 0xeaf6ff, brightness)
    );
  }
  scene.fog.color.set(0x10173a).lerp(new THREE.Color(0xbfe8ff), brightness);

  cloudMat.opacity = 0.15 + 0.85 * brightness;
  for (const c of clouds) {
    c.position.x += Math.cos(Date.now() * 0.00005 * c.userData.speed) * dt * 0.5;
    c.position.z += Math.sin(Date.now() * 0.00005 * c.userData.speed) * dt * 0.5;
  }

  // Update day text
  if (player.dayTime < prevDayTime) {
    player.day++;
    player.score += 20;
    // Spawn more wolves each day
    if (player.day % 2 === 0) {
      const a = Math.random() * Math.PI * 2;
      const d = 25 + Math.random() * 20;
      spawnWolf(Math.cos(a)*d, Math.sin(a)*d);
    }
  }
  document.getElementById('day-text').textContent = `Day ${player.day}`;
  document.getElementById('time-icon').textContent = isDay ? '☀️' : '🌙';

  // ── Survival drain (gradually harsher as night deepens)
  const drainRate = 1.5 - 0.5 * brightness;
  player.hunger -= dt * 1.5 * drainRate;
  player.thirst -= dt * 2.0 * drainRate;
  player.hunger = Math.max(0, player.hunger);
  player.thirst = Math.max(0, player.thirst);

  if (player.hunger <= 0 || player.thirst <= 0) {
    player.hp -= dt * 5;
  } else if (player.hp < 100) {
    player.hp = Math.min(100, player.hp + dt * 2); // slow regen
  }

  // Campfire warmth at night
  for (const fire of fires) {
    const d = camera.position.distanceTo(fire.group.position);
    if (d < 5) {
      player.hp = Math.min(100, player.hp + dt * 3);
      fire.light.intensity = 2 + Math.sin(Date.now()*0.01) * 0.4;
    }
    // flicker
    fire.flame.scale.y = 0.8 + Math.sin(Date.now()*0.007) * 0.2;
    fire.flameCore.scale.y = 0.8 + Math.sin(Date.now()*0.011) * 0.25;
  }

  // Bob & rotate collectibles for a lively, stylized feel
  for (const r of resources) {
    r.position.y = r.userData.baseY + Math.sin(Date.now() * 0.002 + r.userData.bobOffset) * 0.08;
    r.rotation.y += dt * 0.6;
  }

  if (player.hp <= 0) { die('You starved.'); return; }

  // ── Movement
  const fwd  = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  const moveVec = new THREE.Vector3();
  const speed = 6;

  // Keyboard
  if (keys['KeyW'] || keys['ArrowUp'])    moveVec.add(fwd);
  if (keys['KeyS'] || keys['ArrowDown'])  moveVec.sub(fwd);
  if (keys['KeyA'] || keys['ArrowLeft'])  moveVec.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) moveVec.add(right);

  // Joystick
  if (joystick.active) {
    moveVec.add(fwd.clone().multiplyScalar(-joystick.y));
    moveVec.add(right.clone().multiplyScalar(joystick.x));
  }

  if (moveVec.lengthSq() > 0) {
    moveVec.normalize().multiplyScalar(speed * dt);
    camera.position.add(moveVec);
  }

  // World bounds (clamp first, so ground height is sampled at the real final position)
  camera.position.x = Math.max(-90, Math.min(90, camera.position.x));
  camera.position.z = Math.max(-90, Math.min(90, camera.position.z));

  // Keep on ground (terrain sampling)
  const gx = camera.position.x, gz = camera.position.z;
  const groundY = getTerrainHeight(gx, gz);
  camera.position.y = Math.max(groundY + 1.7, 1.7);

  // ── Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  // ── Placement ghost preview (follows the player while placing an item)
  if (placingItem && ghostMesh) {
    const flatDir = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
    const px = camera.position.x + flatDir.x * 2.5;
    const pz = camera.position.z + flatDir.z * 2.5;
    const py = getTerrainHeight(px, pz);
    if (placingItem.type === 'wall') {
      ghostMesh.position.set(px, py + 1.0, pz);
      ghostMesh.rotation.y = player.yaw;
    } else if (placingItem.type === 'ceiling') {
      ghostMesh.position.set(px, py + 2.2, pz);
    } else if (placingItem.type === 'floor') {
      ghostMesh.position.set(px, py + 0.05, pz);
    } else if (placingItem.type === 'crafting_table') {
      ghostMesh.position.set(px, py + 0.45, pz);
      ghostMesh.rotation.y = player.yaw;
    } else { // campfire
      ghostMesh.position.set(px, py + 0.2, pz);
    }
  }

  // ── Attack cooldown
  if (player.attackCooldown > 0) player.attackCooldown -= dt;

  // ── Axe swing animation (only visible while the axe is equipped)
  axeGroup.visible = !!(hotbar[player.selectedSlot] && hotbar[player.selectedSlot].type === 'axe');
  if (axeSwingTimer > 0) {
    axeSwingTimer = Math.max(0, axeSwingTimer - dt);
    const t = 1 - axeSwingTimer / 0.25;
    axeGroup.rotation.x = 0.3 - Math.sin(t * Math.PI) * 0.9;
    axeGroup.rotation.y = -0.5 - Math.sin(t * Math.PI) * 0.3;
  } else {
    axeGroup.rotation.x = 0.3;
    axeGroup.rotation.y = -0.5;
  }

  // ── Wolf AI
  const camPos = camera.position.clone();
  for (const wolf of wolves) {
    const dist = wolf.position.distanceTo(camPos);
    if (dist < wolf.userData.alertRange) {
      // Chase
      const dir2 = camPos.clone().sub(wolf.position).normalize();
      wolf.position.add(dir2.multiplyScalar(wolf.userData.speed * dt));
      wolf.lookAt(camPos.x, wolf.position.y, camPos.z);
      // Terrain follow
      wolf.position.y = getTerrainHeight(wolf.position.x, wolf.position.z);

      if (dist < 1.5) {
        player.hp -= dt * 15;
        showMsg('🐺 Wolf attacks you!');
      }
    } else {
      // Wander
      wolf.position.x += Math.sin(Date.now()*0.001 + wolf.userData.speed) * dt * 1;
      wolf.position.z += Math.cos(Date.now()*0.0008 + wolf.userData.speed) * dt * 1;
      wolf.position.y = getTerrainHeight(wolf.position.x, wolf.position.z);
    }
  }

  // ── Score over time
  player.score += dt;

  // ── Crafting table proximity: show a dedicated button instead of a popup
  const nearTable = craftingTables.some(t => camera.position.distanceTo(t.position) < 3.5);
  document.getElementById('craft-prompt-btn').style.display = nearTable ? 'flex' : 'none';

  // ── Gentle lake shimmer
  for (const lake of lakeCenters) {
    lake.mesh.material.opacity = 0.78 + Math.sin(Date.now() * 0.001 + lake.x) * 0.07;
  }

  updateHUD();
  renderer.render(scene, camera);
}
